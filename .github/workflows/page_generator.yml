name: phone page builder pipeline

on:
  schedule:
    - cron: "0 */6 * * *"   # incremental
    - cron: "30 2 * * *"    # keyword
    - cron: "0 3 * * 0"     # full rebuild
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests

      # 🔥 MODE DETECTION (FIXED - NO github.event.schedule bug)
      - name: Set Build Mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          DAY=$(date -u +%u)

          echo "Time: $HOUR:$MIN Day: $DAY"

          if [ "$DAY" -eq 7 ] && [ "$HOUR" -eq 03 ]; then
            echo "mode=full" >> $GITHUB_OUTPUT

          elif [ "$HOUR" -eq 02 ] && [ "$MIN" -eq 30 ]; then
            echo "mode=keyword" >> $GITHUB_OUTPUT

          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi

      # 🚀 RUN BUILD
      - name: Run Build
        run: |
          echo "Running mode: ${{ steps.mode.outputs.mode }}"

          if [ "${{ steps.mode.outputs.mode }}" = "full" ]; then
            echo "FULL REBUILD"
            rm -f data/page_index.json
            export LAUNCH_PHASE=3
            export MAX_KEYWORDS=700

          elif [ "${{ steps.mode.outputs.mode }}" = "keyword" ]; then
            echo "KEYWORD BUILD"
            export LAUNCH_PHASE=3
            export MAX_KEYWORDS=300

          else
            echo "INCREMENTAL BUILD"
            export LAUNCH_PHASE=1
          fi

          python script/page_generator.py

      # 💾 COMMIT CHANGES
      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add .

          git diff --cached --quiet || git commit -m "Auto build $(date -u)"
          git push
