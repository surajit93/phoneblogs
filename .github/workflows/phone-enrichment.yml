name: phone-enrichment

on:
  schedule:
    - cron: "15 2 * * *"
    - cron: "15 10 * * *"
    - cron: "15 18 * * *"
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 cloudscraper

      - name: Run enrichment
        run: |
          python scripts/phone_data_enricher.py

      - name: Debug output
        run: |
          echo "---- ENRICHED FILE SIZE ----"
          wc -c data/phones/phones_enriched.json || true

          echo "---- SAMPLE ----"
          head -n 10 data/phones/phones_enriched.json || true

      - name: Upload enriched dataset
        uses: actions/upload-artifact@v4
        with:
          name: phones-enriched
          path: data/phones/phones_enriched.json

      - name: Commit enriched dataset
        run: |
          git config --global user.name "phoneblogs-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add data/phones/phones_enriched.json

          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi

          git commit -m "update enriched phone dataset"

          git push origin HEAD:main
