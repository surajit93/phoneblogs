name: Keyword Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # daily run

jobs:
  run-keywords:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytrends

      - name: Run keyword engine
        run: python scripts/keyword_engine.py

      - name: Commit keywords.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/keywords.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update keywords"

          git push
