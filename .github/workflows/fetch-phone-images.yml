name: phone-image-fetcher

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 11 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  fetch-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest
        run: git pull || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests beautifulsoup4 cloudscraper

      - name: Run script
        run: |
          python scripts/fetch_phone_images.py

      - name: Debug
        run: |
          echo "---- IMAGE COUNT ----"
          find data/images -type f | wc -l || true
          echo "---- SAMPLE ----"
          find data/images | head -n 20 || true

      - name: Commit
        run: |
          git config --global user.name "phoneblogs-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add data/images

          git diff --cached --quiet && echo "no changes" && exit 0

          git commit -m "update phone images + metadata"

          git pull --rebase origin ${{ github.ref_name }} || true
          git push
