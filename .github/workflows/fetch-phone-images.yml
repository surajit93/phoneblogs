name: phone-image-fetcher

on:
  schedule:
  - cron: "0 */2 * * *"
  workflow_dispatch:

# 🔥 CRITICAL FIX (without this push won't work)
permissions:
  contents: write

jobs:
  fetch-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ❌ REMOVED git pull (causes issues in CI)

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests beautifulsoup4 cloudscraper

      - name: Run script
        run: |
          python scripts/fetch_phone_images.py

      # 🔥 DEBUG (unchanged)
      - name: Debug
        run: |
          echo "---- IMAGE ROOT ----"
          ls -lah data || true
          ls -lah data/images || true

          echo "---- IMAGE COUNT ----"
          find data/images -type f | wc -l || true

          echo "---- SAMPLE ----"
          find data/images | head -n 20 || true

      # 🔥 FINAL COMMIT FIX
      - name: Commit
        run: |
          git config --global user.name "phoneblogs-bot"
          git config --global user.email "bot@users.noreply.github.com"

          echo "---- BEFORE ADD ----"
          git status

          # 🔥 add everything
          git add -A
          git add -f data/images || true

          echo "---- AFTER ADD ----"
          git status

          echo "---- TRACKED FILE CHECK ----"
          git ls-files | grep data/images || echo "NO FILES TRACKED"

          git commit -m "update phone images + metadata" || echo "nothing to commit"

          # 🔥 clean push (no rebase issues)
          git push origin HEAD:${{ github.ref_name }}
