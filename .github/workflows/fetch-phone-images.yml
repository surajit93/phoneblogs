name: phone-image-fetcher

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 11 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  fetch-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest
        run: git pull || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests beautifulsoup4 cloudscraper

      - name: Run script
        run: |
          python scripts/fetch_phone_images.py

      # 🔥 ENHANCED DEBUG (ADDED, not replacing)
      - name: Debug
        run: |
          echo "---- IMAGE ROOT ----"
          ls -lah data || true
          ls -lah data/images || true

          echo "---- IMAGE COUNT ----"
          find data/images -type f | wc -l || true

          echo "---- SAMPLE ----"
          find data/images | head -n 20 || true

      # 🔥 IMPROVED COMMIT (SAFE UPGRADE)
      - name: Commit
        run: |
          git config --global user.name "phoneblogs-bot"
          git config --global user.email "bot@users.noreply.github.com"
      
          echo "---- BEFORE ADD ----"
          git status
      
          # 🔥 FORCE ADD EVERYTHING INCLUDING NEW DIRS
          git add -A
          git add -f data/images || true
      
          echo "---- AFTER ADD ----"
          git status
      
          # 🔥 DEBUG - ensure files are detected
          git ls-files | grep data/images || echo "NO FILES TRACKED"
      
          git commit -m "update phone images + metadata" || echo "nothing to commit"
      
          git push origin HEAD:${{ github.ref_name }}
