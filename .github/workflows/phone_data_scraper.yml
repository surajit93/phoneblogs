name: phone-dataset-builder

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 10 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 cloudscraper

      - name: Run scraper
        run: |
          python scripts/phone_data_scraper.py

      # 🔥 HARD DEBUG (no guessing anymore)
      - name: Debug file output
        run: |
          echo "---- FILE PATH ----"
          realpath data/phones/phones.json || true

          echo "---- FILE LIST ----"
          ls -lah data/phones || true

          echo "---- FILE SIZE ----"
          wc -c data/phones/phones.json || true

          echo "---- FILE HEAD ----"
          head -n 20 data/phones/phones.json || true

      # 🔥 CRITICAL: persist output
      - name: Upload phones.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: phones-dataset
          path: data/phones/phones.json

      # 🔥 Commit only if changed
      - name: Commit dataset updates
        run: |
          git config --global user.name "phoneblogs-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add data/phones/phones.json

          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi

          git commit -m "update phone dataset"

          git pull --rebase origin ${{ github.ref_name }} || true
          git push
