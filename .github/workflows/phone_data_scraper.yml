name: phone-dataset-builder

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 10 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ ensure latest state before commit later
      - name: Pull latest changes
        run: git pull || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 cloudscraper

      - name: Run scraper
        run: |
          python scripts/phone_data_scraper.py

      # ✅ DEBUG: confirm file exists + size
      - name: Debug file output
        run: |
          echo "---- FILE CHECK ----"
          ls -lah data/phones || true
          echo "---- FILE CONTENT SIZE ----"
          wc -c data/phones/phones.json || true
          echo "---- FIRST 20 LINES ----"
          head -n 20 data/phones/phones.json || true

      # ✅ Upload artifact (CRITICAL for debugging)
      - name: Upload phones.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: phones-dataset
          path: data/phones/phones.json

      - name: Commit dataset updates
        run: |
          git config --global user.name "phoneblogs-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add data/phones/phones.json

          # ✅ check if anything actually changed
          git diff --cached --quiet && echo "no changes" && exit 0

          git commit -m "update phone dataset"

          # ✅ safer push
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
