name: phone-dataset-builder

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 10 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔥 important for push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 cloudscraper

      - name: Run scraper
        run: |
          python scripts/phone_data_scraper.py

      - name: Debug file output
        run: |
          echo "---- FILE SIZE ----"
          wc -c data/phones/phones.json || true

          echo "---- FIRST 10 LINES ----"
          head -n 10 data/phones/phones.json || true

      - name: Upload phones.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: phones-dataset
          path: data/phones/phones.json

      - name: Commit dataset updates
        run: |
          git config --global user.name "phoneblogs-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add data/phones/phones.json

          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi

          git commit -m "update phone dataset"

          git push origin HEAD:main
