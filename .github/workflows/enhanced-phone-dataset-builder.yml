name: enhanced-phone-dataset-builder

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 10 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write  

concurrency:
  group: phone-dataset
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔥 important for push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 cloudscraper

      - name: Run scraper
        run: |
          python scripts/enhanced_phone_scraper.py

      - name: Debug file output
        run: |
          echo "---- FILE SIZE ----"
          wc -c data/phones/phones_updated.json || true

          echo "---- FIRST 10 LINES ----"
          head -n 10 data/phones/phones_updated.json || true

      - name: Upload phones_updated.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: phones-dataset
          path: data/phones/phones_updated.json

      - name: Commit dataset updates
        run: |
          git config user.name "phoneblogs-bot"
          git config user.email "bot@users.noreply.github.com"
      
          git add data/phones/phones_updated.json
      
          echo "---- GIT STATUS ----"
          git status
      
          echo "Git handled inside script" || echo "no commit"
      
          echo "Skipping push — handled in script"
